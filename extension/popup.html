<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 260px; padding: 12px; font-family: -apple-system, sans-serif; font-size: 13px; }
    h3 { margin: 0 0 8px; font-size: 14px; }
    .status { padding: 6px 8px; border-radius: 6px; background: #f0f2f5; margin-bottom: 8px; }
    .status.active { background: #dcfce7; color: #166534; }
    .status.idle { background: #fef9c3; color: #854d0e; }
    a { color: #2563eb; }
    button { width: 100%; padding: 8px; border: none; border-radius: 6px; background: #2563eb; color: #fff; font-weight: 600; cursor: pointer; margin-top: 6px; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <h3>Etsy Scraper</h3>
  <div class="status" id="status">Checking...</div>
  <div id="info"></div>
  <button id="openDash">Open Dashboard</button>
  <script src="popup.js"></script>
</body>
</html>
