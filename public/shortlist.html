<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Products — Etsy Scraper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
  </svg>
  <h1>Etsy Scraper</h1>
  <nav class="header-nav">
    <a href="index.html">Dashboard</a>
    <a href="pending.html">Pending</a>
    <a href="rejected.html">Rejected</a>
    <a href="a-tier.html">A Tier</a>
    <a href="s-tier.html">S Tier</a>
  </nav>
</header>

<div class="container">

  <div class="search-info">
    <div>
      <h2>All Shortlisted Products</h2>
    </div>
    <div class="stats" id="stats"></div>
  </div>

  <div id="content">
    <div class="state-msg"><div class="spinner"></div><h3>Loading...</h3></div>
  </div>

</div>

<!-- Lightbox overlay -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="">
</div>

<script>
function openLightbox(src) {
  var lb = document.getElementById('lightbox');
  document.getElementById('lightboxImg').src = src;
  lb.classList.add('active');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});

(function () {
  const content = document.getElementById('content');
  const stats = document.getElementById('stats');

  function escHtml(str) {
    const el = document.createElement('span');
    el.textContent = str;
    return el.innerHTML;
  }

  function sortByPrice(listings) {
    return listings.sort(function(a, b) {
      var ma = (a.price || '').match(/\$([\d.,]+)/);
      var mb = (b.price || '').match(/\$([\d.,]+)/);
      var pa = ma ? parseFloat(ma[1].replace(/,/g, '')) : 0;
      var pb = mb ? parseFloat(mb[1].replace(/,/g, '')) : 0;
      return pb - pa;
    });
  }

  function tierButtons(listingId, currentTier) {
    const tiers = [
      { value: 'pending', label: 'Pending', cls: 'tier-btn-pending' },
      { value: 'rejected', label: 'Rejected', cls: 'tier-btn-rejected' },
      { value: 'a', label: 'A Tier', cls: 'tier-btn-a' },
      { value: 's', label: 'S Tier', cls: 'tier-btn-s' },
    ];
    return '<div class="tier-buttons">' + tiers.map(t => {
      const active = t.value === currentTier ? ' tier-btn-active' : '';
      return `<button class="tier-btn ${t.cls}${active}" onclick="moveTier(${listingId}, '${t.value}')">${t.label}</button>`;
    }).join('') + '</div>';
  }

  window.moveTier = async function(listingId, tier) {
    try {
      const res = await fetch('/api/listings/' + listingId + '/tier', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tier }),
      });
      if (!res.ok) throw new Error(res.statusText);
      load();
    } catch (err) {
      alert('Failed to move: ' + err.message);
    }
  };

  async function load() {
    try {
      let listings;
      if (window.__PRELOADED_LISTINGS__) {
        listings = window.__PRELOADED_LISTINGS__;
        delete window.__PRELOADED_LISTINGS__;
      } else {
        const res = await fetch('/api/listings/all');
        if (!res.ok) throw new Error(res.statusText);
        listings = await res.json();
      }

      listings = sortByPrice(listings);
      const keywords = [...new Set(listings.map(l => l.keyword))];
      stats.innerHTML = `
        <span>Total: <strong>${listings.length}</strong></span>
        <span>Searches: <strong>${keywords.length}</strong></span>
      `;

      if (!listings || listings.length === 0) {
        content.innerHTML = '<div class="state-msg"><h3>No shortlisted products yet</h3><p>Run some searches from the dashboard to populate this list.</p></div>';
        return;
      }

      content.innerHTML = '<div class="listings-grid">' + listings.map(l => {
        const imgSrc = l.imageUrl || '';
        const img = imgSrc
          ? `<img class="card-img" src="${escHtml(imgSrc)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'card-img card-img-placeholder\\'><span>${escHtml((l.title||'?')[0].toUpperCase())}</span></div>'">`
          : `<div class="card-img card-img-placeholder"><span>${escHtml((l.title || '?')[0].toUpperCase())}</span></div>`;

        const priceMatch = (l.price || '').match(/\$([\d.,]+)/); const cleanPrice = priceMatch ? '$' + priceMatch[1] : '';

        const screenshotLink = l.screenshot
          ? `<a href="#" class="screenshot-link" onclick="event.preventDefault();openLightbox('/screenshots/${escHtml(l.screenshot)}')">View screenshot</a>`
          : '';

        return `<div class="card">
          ${img}
          <div class="card-body">
            <div class="card-title"><a href="${escHtml(l.url || '#')}" target="_blank" rel="noopener">${escHtml(l.title || 'Untitled')}</a></div>
            <div class="card-meta">Price: ${escHtml(cleanPrice || '\u2014')}</div>
            <div class="card-meta">Sold: ${l.soldLast24h || 0}</div>
            ${l.keyword ? `<span class="card-keyword">${escHtml(l.keyword)}</span>` : ''}
            ${tierButtons(l.id, l.tier || 'pending')}
            ${screenshotLink}
          </div>
        </div>`;
      }).join('') + '</div>';
    } catch (err) {
      console.error('Failed to load listings:', err);
      content.innerHTML = '<div class="state-msg"><h3>Error loading products</h3><p>' + escHtml(err.message) + '</p></div>';
    }
  }

  load();
})();
</script>

</body>
</html>
