<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etsy Scraper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
  </svg>
  <h1>Etsy Scraper</h1>
  <nav class="header-nav">
    <a href="index.html">Dashboard</a>
    <a href="pending.html">Pending</a>
    <a href="rejected.html">Rejected</a>
    <a href="a-tier.html">A Tier</a>
    <a href="s-tier.html">S Tier</a>
  </nav>
</header>

<div class="container">

  <form class="search-bar" id="searchForm">
    <input type="text" id="keyword" placeholder="Enter a keyword to search Etsy..." required>
    <button type="submit" id="submitBtn">Search</button>
  </form>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Keyword</th>
          <th>Started</th>
          <th>Duration</th>
          <th>Status</th>
          <th>Listings Scanned</th>
          <th>Shortlisted</th>
          <th>Progress</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="empty-row"><td colspan="8">No searches yet. Enter a keyword above to get started.</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
async function deleteSearch(id) {
  if (!confirm('Delete this search and all its listings?')) return;
  try {
    const res = await fetch('/api/searches/' + id, { method: 'DELETE' });
    if (!res.ok) throw new Error(res.statusText);
    location.reload();
  } catch (err) {
    alert('Failed to delete: ' + err.message);
  }
}

(function () {
  const tableBody = document.getElementById('tableBody');
  const searchForm = document.getElementById('searchForm');
  const keywordInput = document.getElementById('keyword');
  const submitBtn = document.getElementById('submitBtn');
  let refreshTimer = null;

  function statusBadge(status) {
    const map = {
      success:  'badge-success',
      completed:'badge-success',
      blocked:  'badge-blocked',
      running:  'badge-running',
      pending:  'badge-running',
      error:    'badge-error',
      failed:   'badge-error',
    };
    const cls = map[status] || 'badge-error';
    return `<span class="badge ${cls}">${status}</span>`;
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function formatDuration(startIso, endIso) {
    if (!startIso) return '—';
    const end = endIso ? new Date(endIso).getTime() : Date.now();
    const elapsed = end - new Date(startIso).getTime();
    if (elapsed < 0) return '0s';
    const s = Math.floor(elapsed / 1000) % 60;
    const m = Math.floor(elapsed / 60000) % 60;
    const h = Math.floor(elapsed / 3600000);
    if (h > 0) return h + 'h ' + m + 'm';
    if (m > 0) return m + 'm ' + s + 's';
    return s + 's';
  }

  let timerInterval = null;
  function startTimerTick() {
    if (timerInterval) return;
    timerInterval = setInterval(() => {
      document.querySelectorAll('[data-started]').forEach(el => {
        el.textContent = formatDuration(el.dataset.started);
      });
    }, 1000);
  }

  function renderTable(searches) {
    if (!searches || searches.length === 0) {
      tableBody.innerHTML = '<tr class="empty-row"><td colspan="8">No searches yet. Enter a keyword above to get started.</td></tr>';
      return;
    }

    const sorted = [...searches].sort((a, b) => new Date(b.startedAt || b.createdAt || 0) - new Date(a.startedAt || a.createdAt || 0));

    tableBody.innerHTML = sorted.map(s => {
      const totalPages = s.totalPages || 20;
      const pagesScraped = s.pagesScraped || 0;
      const pct = Math.min(100, Math.round((pagesScraped / totalPages) * 100));
      const startTime = s.startedAt || s.createdAt;
      const isRunning = s.status === 'running' || s.status === 'pending';
      const durationCell = isRunning
        ? `<span class="timer-live" data-started="${escHtml(startTime)}">${formatDuration(startTime)}</span>`
        : `<span class="timer-done">${formatDuration(startTime, s.completedAt)}</span>`;
      return `<tr>
        <td><strong>${escHtml(s.keyword)}</strong></td>
        <td>${formatDate(startTime)}</td>
        <td>${durationCell}</td>
        <td>${statusBadge(s.status)}</td>
        <td>${s.listingsScanned ?? 0}</td>
        <td>${s.shortlisted ?? 0}</td>
        <td>
          <div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>
          <div class="progress-text">${pagesScraped}/${totalPages} pages (${pct}%)</div>
        </td>
        <td>
          <a href="results.html?id=${s.id}">View Results</a>
          <button class="btn-delete" onclick="deleteSearch('${s.id}')">Delete</button>
        </td>
      </tr>`;
    }).join('');
  }

  function escHtml(str) {
    const el = document.createElement('span');
    el.textContent = str;
    return el.innerHTML;
  }

  async function loadSearches() {
    try {
      const res = await fetch('/api/searches');
      if (!res.ok) throw new Error(res.statusText);
      const data = await res.json();
      const searches = Array.isArray(data) ? data : (data.searches || []);
      renderTable(searches);

      const hasRunning = searches.some(s => s.status === 'running' || s.status === 'pending');
      if (hasRunning) startTimerTick();
      if (hasRunning && !refreshTimer) {
        refreshTimer = setInterval(loadSearches, 5000);
      } else if (!hasRunning && refreshTimer) {
        clearInterval(refreshTimer);
        refreshTimer = null;
      }
    } catch (err) {
      console.error('Failed to load searches:', err);
    }
  }

  searchForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const keyword = keywordInput.value.trim();
    if (!keyword) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Starting...';

    try {
      const res = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ keyword }),
      });
      if (!res.ok) throw new Error(res.statusText);
      const data = await res.json();

      // Trigger server-side Puppeteer scanner
      try {
        await fetch('/api/searches/' + data.id + '/start-scan', { method: 'POST' });
      } catch (scanErr) {
        console.warn('Failed to start server scanner (extension fallback may still work):', scanErr);
      }

      keywordInput.value = '';
      await loadSearches();
      // Ensure auto-refresh is going
      if (!refreshTimer) {
        refreshTimer = setInterval(loadSearches, 5000);
      }
      // Stay on dashboard — table auto-refreshes via loadSearches()
    } catch (err) {
      console.error('Failed to start search:', err);
      alert('Failed to start search. Check the console for details.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Search';
    }
  });

  // Initial load
  loadSearches();
})();
</script>

</body>
</html>
