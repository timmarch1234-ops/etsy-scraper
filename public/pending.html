<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pending — Etsy Scraper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"/>
  </svg>
  <h1>Etsy Scraper</h1>
  <nav class="header-nav">
    <a href="index.html">Dashboard</a>
    <a href="s-tier.html">S Tier</a>
    <a href="a-tier.html">A Tier</a>
    <a href="pending.html">Pending</a>
    <a href="rejected.html">Rejected</a>
  </nav>
</header>

<div class="container">
  <div class="search-info">
    <div><h2>Pending Products</h2></div>
    <div class="stats" id="stats"></div>
  </div>
  <div id="content">
    <div class="state-msg"><div class="spinner"></div><h3>Loading...</h3></div>
  </div>
</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="">
</div>

<script>
function openLightbox(src) {
  var lb = document.getElementById('lightbox');
  document.getElementById('lightboxImg').src = src;
  lb.classList.add('active');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});

const TIER = 'pending';

(function () {
  const content = document.getElementById('content');
  const stats = document.getElementById('stats');

  function escHtml(str) {
    const el = document.createElement('span');
    el.textContent = str;
    return el.innerHTML;
  }

  function tierButtons(listingId, currentTier) {
    const tiers = [
      { value: 's', label: 'S Tier', cls: 'tier-btn-s' },
      { value: 'a', label: 'A Tier', cls: 'tier-btn-a' },
      { value: 'pending', label: 'Pending', cls: 'tier-btn-pending' },
      { value: 'rejected', label: 'Rejected', cls: 'tier-btn-rejected' },
    ];
    return '<div class="tier-buttons">' + tiers.map(t => {
      const active = t.value === currentTier ? ' tier-btn-active' : '';
      return `<button class="tier-btn ${t.cls}${active}" onclick="moveTier(${listingId}, '${t.value}')">${t.label}</button>`;
    }).join('') + '</div>';
  }

  window.moveTier = async function(listingId, tier) {
    try {
      const res = await fetch('/api/listings/' + listingId + '/tier', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tier }),
      });
      if (!res.ok) throw new Error(res.statusText);
      load();
    } catch (err) {
      alert('Failed to move: ' + err.message);
    }
  };

  async function load() {
    try {
      const res = await fetch('/api/listings/tier/' + TIER);
      if (!res.ok) throw new Error(res.statusText);
      const listings = await res.json();

      stats.innerHTML = `<span>Total: <strong>${listings.length}</strong></span>`;

      if (!listings || listings.length === 0) {
        content.innerHTML = '<div class="state-msg"><h3>No products in this tier</h3><p>Move products here from other pages.</p></div>';
        return;
      }

      content.innerHTML = '<div class="listings-grid">' + listings.map(l => {
        const imgSrc = l.imageUrl || '';
        const img = imgSrc
          ? `<img class="card-img" src="${escHtml(imgSrc)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'card-img card-img-placeholder\\'><span>${escHtml((l.title||'?')[0].toUpperCase())}</span></div>'">`
          : `<div class="card-img card-img-placeholder"><span>${escHtml((l.title || '?')[0].toUpperCase())}</span></div>`;

        const soldBadge = l.soldLast24h
          ? `<span class="card-sold">${escHtml(String(l.soldLast24h))} sold in last 24 hours</span>`
          : '';

        const screenshotLink = l.screenshot
          ? `<a href="#" class="screenshot-link" onclick="event.preventDefault();openLightbox('/screenshots/${escHtml(l.screenshot)}')">View screenshot</a>`
          : '';

        return `<div class="card">
          ${img}
          <div class="card-body">
            <div class="card-title"><a href="${escHtml(l.url || '#')}" target="_blank" rel="noopener">${escHtml(l.title || 'Untitled')}</a></div>
            <div class="card-price">${escHtml(l.price || '\u2014')}</div>
            ${soldBadge}
            ${screenshotLink}
            <span class="card-keyword">${escHtml(l.keyword || 'Unknown')}</span>
            ${tierButtons(l.id, TIER)}
          </div>
        </div>`;
      }).join('') + '</div>';
    } catch (err) {
      console.error('Failed to load listings:', err);
      content.innerHTML = '<div class="state-msg"><h3>Error loading products</h3><p>' + escHtml(err.message) + '</p></div>';
    }
  }

  load();
})();
</script>

</body>
</html>
